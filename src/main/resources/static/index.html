<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>pcb-gcode-gen</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
	<header id="project-meta">
		<h1>pcb-gcode-gen</h1>
		<div class="meta-fields">
			<label>Nom du projet
				<input id="meta-projectName" type="text" />
			</label>
			<label>Tête
				<select id="meta-bitHead">
					<option value="LASER">Laser</option>
					<option value="ROUTER">Routeur</option>
				</select>
			</label>
			<label>Safe level (mm)
				<input id="meta-safeLevel" type="number" step="any" />
			</label>
			<label>Incrément de passe (mm)
				<input id="meta-passIncrement" type="number" step="any" />
			</label>
			<label>Feed rate
				<input id="meta-feedRate" type="number" step="any" />
			</label>
			<label>Power
				<input id="meta-power" type="number" step="any" />
			</label>
			<button id="btn-save-meta">Mettre à jour</button>
		</div>
		<div class="actions">
			<button id="btn-import">Téléverser un projet</button>
			<input id="file-import" type="file" accept="application/json,.json" hidden />
			<button id="btn-export-project">Télécharger le projet</button>
			<button id="btn-export-generated">Télécharger le JSON généré</button>
			<button id="btn-export-gcode">Générer et télécharger le G-code</button>
			<button id="btn-save">Enregistrer le projet</button>
			<button id="btn-generate" class="primary">Générer le G-code</button>
		</div>
	</header>

	<main>
		<section id="tree-panel">
			<div class="panel-header">
				<h2>Couches</h2>
				<button id="btn-add-layer">+ Couche</button>
			</div>
			<div id="layer-tree"></div>
		</section>

		<section id="preview-panel">
			<div class="preview-header">
				<h2>Prévisualisation (mm)</h2>
				<div class="preview-controls">
					<button id="btn-zoom-out" title="Zoom arrière">−</button>
					<button id="btn-zoom-in" title="Zoom avant">+</button>
					<button id="btn-zoom-reset" title="Cadrer sur le contenu">Réinitialiser la vue</button>
					<button id="btn-flip-h" title="Miroir horizontal de l'affichage">⇋ Horizontal</button>
					<button id="btn-flip-v" title="Miroir vertical de l'affichage">⇵ Vertical</button>
				</div>
			</div>
			<div id="canvas-wrap">
				<div id="ruler-corner"></div>
				<svg id="ruler-top" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"></svg>
				<svg id="ruler-left" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"></svg>
				<svg id="preview-svg" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"></svg>
			</div>
		</section>

		<section id="form-panel">
			<h2 id="form-title">Sélectionnez ou ajoutez une forme</h2>
			<div id="element-form"></div>
		</section>
	</main>

	<div id="toast" class="hidden"></div>
	<datalist id="font-list"></datalist>

	<script src="app.js"></script>
</body>
</html>
