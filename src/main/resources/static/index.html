<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>pcb-gcode-gen</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
	<!--
		Inline SVG sprite (Lucide-style icons, 24x24, stroke-based). Referenced
		via <use href="#i-name"> both here and from app.js's icon() helper.
		stroke/fill come from CSS on .icon so the sprite stays attribute-free.
	-->
	<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
		<symbol id="i-zap" viewBox="0 0 24 24"><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z" /></symbol>
		<symbol id="i-save" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" /><path d="M17 21v-8H7v8" /><path d="M7 3v5h8" /></symbol>
		<symbol id="i-folder" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" /></symbol>
		<symbol id="i-folder-open" viewBox="0 0 24 24"><path d="m6 14 1.45-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.55 6a2 2 0 0 1-1.94 1.5H4a2 2 0 0 1-2-2V5c0-1.1.9-2 2-2h3.93a2 2 0 0 1 1.66.9l.82 1.2a2 2 0 0 0 1.66.9H18a2 2 0 0 1 2 2v2" /></symbol>
		<symbol id="i-chevron-down" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6" /></symbol>
		<symbol id="i-upload" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><path d="m17 8-5-5-5 5" /><path d="M12 3v12" /></symbol>
		<symbol id="i-download" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><path d="m7 10 5 5 5-5" /><path d="M12 15V3" /></symbol>
		<symbol id="i-route" viewBox="0 0 24 24"><circle cx="6" cy="19" r="3" /><circle cx="18" cy="5" r="3" /><path d="M12 19h4.5a3.5 3.5 0 0 0 0-7h-8a3.5 3.5 0 0 1 0-7H12" /></symbol>
		<symbol id="i-check" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5" /></symbol>
		<symbol id="i-plus" viewBox="0 0 24 24"><path d="M12 5v14" /><path d="M5 12h14" /></symbol>
		<symbol id="i-refresh" viewBox="0 0 24 24"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" /><path d="M21 3v5h-5" /><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" /><path d="M8 16H3v5" /></symbol>
		<symbol id="i-eye" viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" /><circle cx="12" cy="12" r="3" /></symbol>
		<symbol id="i-eye-off" viewBox="0 0 24 24"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" /><path d="M10.73 5.08A10.4 10.4 0 0 1 12 5c6.5 0 10 7 10 7a13.2 13.2 0 0 1-1.67 2.68" /><path d="M6.61 6.61A13.5 13.5 0 0 0 2 12s3.5 7 10 7a9.7 9.7 0 0 0 5.39-1.61" /><path d="m2 2 20 20" /></symbol>
		<symbol id="i-ban" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" /><path d="m4.9 4.9 14.2 14.2" /></symbol>
		<symbol id="i-check-circle" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" /><path d="m9 12 2 2 4-4" /></symbol>
		<symbol id="i-more-h" viewBox="0 0 24 24"><circle cx="12" cy="12" r="1" /><circle cx="19" cy="12" r="1" /><circle cx="5" cy="12" r="1" /></symbol>
		<symbol id="i-pencil" viewBox="0 0 24 24"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z" /><path d="m15 5 4 4" /></symbol>
		<symbol id="i-trash" viewBox="0 0 24 24"><path d="M3 6h18" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" /><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /><path d="M10 11v6" /><path d="M14 11v6" /></symbol>
		<symbol id="i-zoom-in" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" /><path d="m21 21-4.3-4.3" /><path d="M11 8v6" /><path d="M8 11h6" /></symbol>
		<symbol id="i-zoom-out" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" /><path d="m21 21-4.3-4.3" /><path d="M8 11h6" /></symbol>
		<symbol id="i-maximize" viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3" /><path d="M21 8V5a2 2 0 0 0-2-2h-3" /><path d="M3 16v3a2 2 0 0 0 2 2h3" /><path d="M16 21h3a2 2 0 0 0 2-2v-3" /></symbol>
		<symbol id="i-flip-h" viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v14c0 1.1.9 2 2 2h3" /><path d="M16 3h3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-3" /><path d="M12 20v2" /><path d="M12 14v2" /><path d="M12 8v2" /><path d="M12 2v2" /></symbol>
		<symbol id="i-flip-v" viewBox="0 0 24 24"><path d="M21 8V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v3" /><path d="M3 16v3c0 1.1.9 2 2 2h14a2 2 0 0 0 2-2v-3" /><path d="M4 12H2" /><path d="M10 12H8" /><path d="M16 12h-2" /><path d="M22 12h-2" /></symbol>
		<symbol id="i-rotate-cw" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8" /><path d="M21 3v5h-5" /></symbol>
		<symbol id="i-x" viewBox="0 0 24 24"><path d="M18 6 6 18" /><path d="m6 6 12 12" /></symbol>
		<symbol id="i-layers" viewBox="0 0 24 24"><path d="M12 2 2 7l10 5 10-5-10-5z" /><path d="m2 17 10 5 10-5" /><path d="m2 12 10 5 10-5" /></symbol>
		<symbol id="i-image" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" /><circle cx="9" cy="9" r="2" /><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" /></symbol>
		<symbol id="i-sliders" viewBox="0 0 24 24"><path d="M4 21v-7" /><path d="M4 10V3" /><path d="M12 21v-9" /><path d="M12 8V3" /><path d="M20 21v-5" /><path d="M20 12V3" /><path d="M2 14h4" /><path d="M10 8h4" /><path d="M18 16h4" /></symbol>
	</svg>

	<header id="project-meta">
		<div class="header-top">
			<h1><svg class="icon logo" aria-hidden="true"><use href="#i-route" /></svg>pcb-gcode-gen</h1>
			<div class="actions">
				<div class="actions-primary">
					<button id="btn-save" title="Enregistrer dans le navigateur (remplace la sauvegarde précédente)"><svg class="icon" aria-hidden="true"><use href="#i-save" /></svg><span>Enregistrer le projet</span></button>
					<button id="btn-load" title="Charger le projet enregistré dans le navigateur"><svg class="icon" aria-hidden="true"><use href="#i-folder-open" /></svg><span>Charger le projet</span></button>
				</div>
				<div class="file-menu">
					<button id="btn-file-menu-toggle" class="file-menu-toggle" type="button" aria-haspopup="true" aria-expanded="false"><svg class="icon" aria-hidden="true"><use href="#i-folder" /></svg><span>Fichier</span><svg class="icon icon-caret" aria-hidden="true"><use href="#i-chevron-down" /></svg></button>
					<div id="file-menu-content" class="file-menu-content">
						<button id="btn-import"><svg class="icon" aria-hidden="true"><use href="#i-upload" /></svg><span>Téléverser un projet</span></button>
						<input id="file-import" type="file" accept="application/json,.json" hidden />
						<button id="btn-export-project"><svg class="icon" aria-hidden="true"><use href="#i-download" /></svg><span>Télécharger le projet</span></button>
					</div>
				</div>
				<button id="btn-export-gcode" class="primary"><svg class="icon" aria-hidden="true"><use href="#i-zap" /></svg><span>Générer et télécharger le G-code</span></button>
			</div>
		</div>
		<details id="meta-details" class="meta-details" open>
			<summary>Paramètres du projet</summary>
			<div class="meta-fields">
				<label>Nom du projet
					<input id="meta-projectName" type="text" />
				</label>
				<label>Tête
					<select id="meta-bitHead">
						<option value="LASER">Laser</option>
						<option value="ROUTER">Routeur</option>
					</select>
				</label>
				<label>Safe level (mm)
					<input id="meta-safeLevel" type="number" step="any" />
				</label>
				<label>Incrément de passe (mm)
					<input id="meta-passIncrement" type="number" step="any" />
				</label>
				<label>Feed rate
					<input id="meta-feedRate" type="number" step="any" />
				</label>
				<label>Power
					<input id="meta-power" type="number" step="any" />
				</label>
				<button id="btn-save-meta"><svg class="icon" aria-hidden="true"><use href="#i-check" /></svg><span>Mettre à jour</span></button>
			</div>
		</details>
	</header>

	<main>
		<!--
			DOM order stays tree / preview / form, matching the desktop grid's
			left-to-right column order (grid auto-placement follows DOM order,
			and this file sets no explicit grid-column). The narrow-screen
			stacked layout instead reorders visually via CSS `order` on each
			section (see style.css) — display:none removes panel-tabs from the
			desktop grid entirely, so its DOM position doesn't affect it either.
		-->
		<section id="tree-panel">
			<div class="panel-header">
				<h2>Couches</h2>
				<button id="btn-add-layer" class="small"><svg class="icon" aria-hidden="true"><use href="#i-plus" /></svg><span>Couche</span></button>
			</div>
			<div id="layer-tree"></div>

			<div class="panel-header">
				<h2>Bibliothèques de blocs</h2>
				<button id="btn-reload-blocks" class="small" title="Cloner/mettre à jour les dépôts et rescanner les blocs"><svg class="icon" aria-hidden="true"><use href="#i-refresh" /></svg><span>Recharger</span></button>
			</div>
			<div id="block-repositories"></div>
			<div class="block-repo-add">
				<input id="block-repo-url" type="text" placeholder="URL du dépôt git (https://, ssh://, git@, ou chemin local)" />
				<button id="btn-add-block-repo" class="small"><svg class="icon" aria-hidden="true"><use href="#i-plus" /></svg><span>Dépôt</span></button>
			</div>
			<div id="block-list" class="muted"></div>
		</section>

		<section id="preview-panel">
			<div class="preview-header">
				<h2>Prévisualisation (mm)</h2>
				<div class="preview-controls">
					<button id="btn-zoom-out" class="icon-btn" title="Zoom arrière" aria-label="Zoom arrière"><svg class="icon" aria-hidden="true"><use href="#i-zoom-out" /></svg></button>
					<button id="btn-zoom-in" class="icon-btn" title="Zoom avant" aria-label="Zoom avant"><svg class="icon" aria-hidden="true"><use href="#i-zoom-in" /></svg></button>
					<button id="btn-zoom-reset" class="icon-btn" title="Cadrer sur le contenu" aria-label="Cadrer sur le contenu"><svg class="icon" aria-hidden="true"><use href="#i-maximize" /></svg></button>
					<span class="toolbar-sep" aria-hidden="true"></span>
					<button id="btn-flip-h" class="icon-btn" title="Miroir horizontal de l'affichage" aria-label="Miroir horizontal de l'affichage"><svg class="icon" aria-hidden="true"><use href="#i-flip-h" /></svg></button>
					<button id="btn-flip-v" class="icon-btn" title="Miroir vertical de l'affichage" aria-label="Miroir vertical de l'affichage"><svg class="icon" aria-hidden="true"><use href="#i-flip-v" /></svg></button>
				</div>
			</div>
			<div id="canvas-wrap">
				<div id="ruler-corner"></div>
				<svg id="ruler-top" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"></svg>
				<svg id="ruler-left" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"></svg>
				<svg id="preview-svg" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"></svg>
			</div>
		</section>

		<section id="form-panel">
			<h2 id="form-title">Sélectionnez ou ajoutez une forme</h2>
			<div id="element-form"></div>
		</section>

		<nav id="panel-tabs" class="panel-tabs" aria-label="Navigation des panneaux">
			<button class="panel-tab" type="button" data-panel="tree"><svg class="icon" aria-hidden="true"><use href="#i-layers" /></svg><span>Couches</span></button>
			<button class="panel-tab" type="button" data-panel="preview"><svg class="icon" aria-hidden="true"><use href="#i-image" /></svg><span>Aperçu</span></button>
			<button class="panel-tab" type="button" data-panel="form"><svg class="icon" aria-hidden="true"><use href="#i-sliders" /></svg><span>Propriétés</span></button>
		</nav>
	</main>

	<div id="toast" class="hidden"></div>
	<datalist id="font-list"></datalist>
	<datalist id="block-list-datalist"></datalist>

	<dialog id="confirm-dialog" class="app-dialog">
		<form method="dialog" class="app-dialog-form">
			<p id="confirm-dialog-message"></p>
			<div id="confirm-dialog-input-wrap" class="field hidden">
				<input id="confirm-dialog-input" type="text" />
			</div>
			<div class="form-actions">
				<button type="submit" value="cancelled"><svg class="icon" aria-hidden="true"><use href="#i-x" /></svg><span>Annuler</span></button>
				<button type="submit" value="confirmed" class="primary"><svg class="icon" aria-hidden="true"><use href="#i-check" /></svg><span>Confirmer</span></button>
			</div>
		</form>
	</dialog>

	<script src="app.js"></script>
</body>
</html>
